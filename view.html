<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Đại Việt - Trang Trưng Bày</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- jsPDF & html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="view.css">
</head>
<body>

    <!-- Tree Container (Pan & Zoom) -->
    <div class="tree-wrapper" id="treeWrapper">
        <div class="tree" id="treeContainer">
            <svg id="svgCanvas"></svg>
            <div id="treeNodesContainer">
                <!-- Family tree will be rendered here via JS -->
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="view-controls no-print">
        <select id="pdfFormat" class="select-format" style="margin-right: 10px; background: rgba(30, 25, 15, 0.8); color: #d4af37; border: 1px solid #d4af37;">
            <option value="a4">Khổ A4</option>
            <option value="a3">Khổ A3</option>
        </select>
        <button class="btn-export" onclick="exportPDF()" title="Xuất file PDF để in">
            <i class="fas fa-file-pdf"></i> Xuất PDF
        </button>
        <a href="index.html" class="edit-mode-btn" title="Chuyển sang chế độ Quản lý / Chỉnh sửa">
            <i class="fas fa-cog"></i> Cài đặt
        </a>
    </div>

    <script src="view.js"></script>
</body>
</html>
